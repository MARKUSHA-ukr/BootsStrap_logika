<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="style.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<header class="vh-100 bg-dark text-white d-flex flex-column justify-content-center align-items-center">

    <h1 class ="text-upperace.mb-3">Cyber-VR 2077</h1>

    <p class="fs-4 mb-4">Занурся у нову реальність вже сьогодні</p>

    <button class="btn btn-primary btn-lg btn-neon">Грати зараз</button>

</header>
<section class="container my-5">
    <h1 class="text-center mb-4">Особливості гри</h1>
    <div class="d-flex justify-content-center gap-4 flex-wrap">
        <div class="card p-3 text-center shadow" style="max-width: 18rem;">
                <img src="card_1.png" alt="">
                <div class="card-body">
                  <h5 class="card-title text-primary">Графіка 4K</h5>
                  <p class="card-text">Найвища деталізація текстур для повного реалізму.</p>
                </div>
              </div>
        
              <div class="card p-3 text-center shadow" style="max-width: 18rem;">
                <img src="card_2.png" alt="">
                <div class="card-body">
                  <h5 class="card-title text-danger">Занурення</h5>
                  <p class="card-text">Відчуй кожен рух завдяки новітнім сенсорам.</p>
                </div>
              </div>
        
              <div class="card p-3 text-center shadow" style="max-width: 18rem;">
                <img src="card_3.png" alt="">
                <div class="card-body">
                  <h5 class="card-title text-success">Мультиплеєр</h5>
                  <p class="card-text">Грай разом з друзями по всьому світу без затримок.</p>
                </div>
            </div>
          </div>
    </div>
</section>
